<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');
        /* preparação */
        *{
            padding: 0;
            margin: 0 auto;
        }
        a{
            text-decoration: none;
            color: black;
            font-family: "Jersey 15", sans-serif;
        }
        .menu{
            background-color: yellow;
            width: 100%;
            height: 40px;
        }
        /* menu */
        .menu ul li{
            background-color: yellow;
            width: 100px;
            height: 40px;
            display: inline;       
            line-height: 40px;
            text-align: center;
            float: left;
            position: relative;           
        }
        .menu ul li:hover{
            background-color: yellowgreen;
        }   
        .menu ul ul{
            display: none;
        }
        /* sub-menu  */
        .menu ul li:hover > ul{
            display: block;
        }
        /* sub-sub-menu  */
        .menu ul ul ul{
            margin-left: 101px;
            position: absolute;
            top: 1px;
        }
        .menu ul ul li:hover{
            background-color:rgb(124, 166, 41);
        }
        .menu ul ul ul li:hover{
            background-color:rgb(87, 116, 29);
        }
    </style>
</head>
<body>
    <nav class="menu">
        <ul>
            <li><a href="#">CAMISAS</a>
                <ul>
                    <li><a href="#">FUTEBOL</a>
                        <ul>
                            <li><a href="#">FUTEBOL</a></li>
                            <li><a href="#">FUTEBOL</a> 
                                <ul>
                                    <li><a href="#">FUTEBOL</a></li>
                                    <li><a href="#">FUTEBOL</a></li>
                                    </li>
                                </ul>                            
                            </li>
                            </li>
                        </ul>
                    </li>
                    <li><a href="#">VOLEI</a></li>
                    <li><a href="#">BASQUETE</a></li>
                </ul>
            </li>
            <li><a href="#">CAMISETAS</a></li>
            <li><a href="#">SAPATOS</a></li>
            <li><a href="#">CALÇAS</a></li>
        </ul>
    </nav>
</body>
</html>
